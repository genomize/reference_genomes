<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 192" width="1640" height="192" fill="none" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#271A2A"/>
      <stop offset="0.55" stop-color="#1B1220"/>
      <stop offset="1" stop-color="#130D18"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFA063"/>
      <stop offset="0.5" stop-color="#F0561F"/>
      <stop offset="1" stop-color="#FF7A40"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F0561F" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#F0561F" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-25%" y="-60%" width="150%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1640" height="192" fill="url(#bg)"/>
  <ellipse cx="1320" cy="96" rx="470" ry="150" fill="url(#glow)"/>

  <!-- brand dotted column (echoes the genomize logo) -->
  <g fill="#F0561F" opacity="0.9">
    <circle cx="40" cy="40" r="4.5"/><circle cx="40" cy="66" r="4.5"/>
    <circle cx="40" cy="92" r="4.5"/><circle cx="40" cy="118" r="4.5"/>
    <circle cx="40" cy="144" r="4.5"/>
  </g>

  <!-- short reads: fragments flowing toward the long read -->
  <g fill="#5FD0BE">
    <rect x="872" y="64"  width="74" height="9" rx="4.5" opacity="0.85"/>
    <rect x="898" y="100" width="56" height="9" rx="4.5" opacity="0.6"/>
    <rect x="930" y="46"  width="50" height="9" rx="4.5" opacity="0.5"/>
    <rect x="946" y="128" width="66" height="9" rx="4.5" opacity="0.8"/>
    <rect x="972" y="82"  width="46" height="9" rx="4.5" opacity="0.55"/>
    <rect x="990" y="112" width="42" height="9" rx="4.5" opacity="0.45"/>
    <rect x="1006" y="58" width="54" height="9" rx="4.5" opacity="0.7"/>
    <rect x="1016" y="138" width="40" height="9" rx="4.5" opacity="0.4"/>
    <rect x="1030" y="92" width="48" height="9" rx="4.5" opacity="0.5"/>
  </g>

  <!-- long read = double helix (glow pass) -->
  <g stroke="url(#orange)" stroke-width="8" stroke-linecap="round" filter="url(#soft)" opacity="0.6">
    <path d="M1060 96 Q1105 32 1150 96 Q1195 160 1240 96 Q1285 32 1330 96 Q1375 160 1420 96 Q1465 32 1510 96 Q1555 160 1600 96"/>
    <path d="M1060 96 Q1105 160 1150 96 Q1195 32 1240 96 Q1285 160 1330 96 Q1375 32 1420 96 Q1465 160 1510 96 Q1555 32 1600 96"/>
  </g>
  <!-- rungs -->
  <g stroke="#FFC49A" stroke-width="3" opacity="0.5">
    <line x1="1105" y1="64" x2="1105" y2="128"/>
    <line x1="1195" y1="64" x2="1195" y2="128"/>
    <line x1="1285" y1="64" x2="1285" y2="128"/>
    <line x1="1375" y1="64" x2="1375" y2="128"/>
    <line x1="1465" y1="64" x2="1465" y2="128"/>
    <line x1="1555" y1="64" x2="1555" y2="128"/>
  </g>
  <!-- crisp helix on top -->
  <g stroke="url(#orange)" stroke-width="6.5" stroke-linecap="round">
    <path d="M1060 96 Q1105 32 1150 96 Q1195 160 1240 96 Q1285 32 1330 96 Q1375 160 1420 96 Q1465 32 1510 96 Q1555 160 1600 96"/>
    <path d="M1060 96 Q1105 160 1150 96 Q1195 32 1240 96 Q1285 160 1330 96 Q1375 32 1420 96 Q1465 160 1510 96 Q1555 32 1600 96"/>
  </g>
  <!-- base nodes at the crossings -->
  <g fill="#FFE0C6">
    <circle cx="1060" cy="96" r="4"/><circle cx="1150" cy="96" r="4"/>
    <circle cx="1240" cy="96" r="4"/><circle cx="1330" cy="96" r="4"/>
    <circle cx="1420" cy="96" r="4"/><circle cx="1510" cy="96" r="4"/>
    <circle cx="1600" cy="96" r="4"/>
  </g>

  <!-- copy -->
  <text x="72" y="58"  fill="#FF9A5C" font-size="19" font-weight="700" letter-spacing="5">LONG-READ SEQUENCING</text>
  <text x="70" y="112" fill="#FBF7F2" font-size="47" font-weight="800" letter-spacing="-0.6">PacBio HiFi, integrated</text>
  <text x="72" y="151" fill="#BEB0C8" font-size="22" font-weight="500">How HiFi long reads slot into your short-read pipeline</text>
  <text x="700" y="151" fill="#FF9A5C" font-size="22" font-weight="700">&#8594;</text>
</svg>
