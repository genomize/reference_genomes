<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 140" width="1280" height="140" fill="none" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F8FB"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF9A5C"/>
      <stop offset="0.5" stop-color="#F0561F"/>
      <stop offset="1" stop-color="#FF7A40"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F0561F" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#F0561F" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-25%" y="-70%" width="150%" height="240%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- light backdrop + hairline border -->
  <rect x="0.5" y="0.5" width="1279" height="139" rx="10" fill="url(#bg)"/>
  <ellipse cx="1090" cy="70" rx="290" ry="96" fill="url(#glow)"/>
  <rect x="0.75" y="0.75" width="1278.5" height="138.5" rx="10" fill="none" stroke="#E6EAF0" stroke-width="1.5"/>

  <!-- brand dotted column (echoes the genomize logo) -->
  <g fill="#F0561F">
    <circle cx="40" cy="42" r="4"/><circle cx="40" cy="59" r="4"/>
    <circle cx="40" cy="76" r="4"/><circle cx="40" cy="93" r="4"/>
    <circle cx="40" cy="110" r="4"/>
  </g>

  <!-- short reads: fragments flowing toward the long read -->
  <g fill="#16A79A">
    <rect x="770" y="50"  width="66" height="8" rx="4" opacity="0.85"/>
    <rect x="792" y="82"  width="50" height="8" rx="4" opacity="0.6"/>
    <rect x="820" y="36"  width="46" height="8" rx="4" opacity="0.5"/>
    <rect x="836" y="100" width="58" height="8" rx="4" opacity="0.8"/>
    <rect x="860" y="66"  width="42" height="8" rx="4" opacity="0.55"/>
    <rect x="884" y="90"  width="38" height="8" rx="4" opacity="0.45"/>
    <rect x="900" y="48"  width="48" height="8" rx="4" opacity="0.7"/>
    <rect x="918" y="110" width="36" height="8" rx="4" opacity="0.4"/>
  </g>

  <!-- long read = double helix (soft glow pass) -->
  <g stroke="url(#orange)" stroke-width="7" stroke-linecap="round" filter="url(#soft)" opacity="0.45">
    <path d="M960 70 Q996 30 1032 70 Q1068 110 1104 70 Q1140 30 1176 70 Q1212 110 1248 70"/>
    <path d="M960 70 Q996 110 1032 70 Q1068 30 1104 70 Q1140 110 1176 70 Q1212 30 1248 70"/>
  </g>
  <!-- rungs -->
  <g stroke="#F4A574" stroke-width="2.6" opacity="0.55">
    <line x1="996"  y1="40" x2="996"  y2="100"/>
    <line x1="1068" y1="40" x2="1068" y2="100"/>
    <line x1="1140" y1="40" x2="1140" y2="100"/>
    <line x1="1212" y1="40" x2="1212" y2="100"/>
  </g>
  <!-- crisp helix on top -->
  <g stroke="url(#orange)" stroke-width="6" stroke-linecap="round">
    <path d="M960 70 Q996 30 1032 70 Q1068 110 1104 70 Q1140 30 1176 70 Q1212 110 1248 70"/>
    <path d="M960 70 Q996 110 1032 70 Q1068 30 1104 70 Q1140 110 1176 70 Q1212 30 1248 70"/>
  </g>
  <!-- base nodes at the crossings -->
  <g fill="#F0561F">
    <circle cx="960"  cy="70" r="3.6"/><circle cx="1032" cy="70" r="3.6"/>
    <circle cx="1104" cy="70" r="3.6"/><circle cx="1176" cy="70" r="3.6"/>
    <circle cx="1248" cy="70" r="3.6"/>
  </g>

  <!-- copy -->
  <text x="64" y="44"  fill="#E35E33" font-size="15" font-weight="700" letter-spacing="4">LONG-READ SEQUENCING</text>
  <text x="62" y="85"  fill="#2C3E50" font-size="37" font-weight="800" letter-spacing="-0.4">PacBio HiFi, integrated</text>
  <text x="64" y="116" fill="#6B7A8D" font-size="17" font-weight="500">How HiFi long reads slot into your short-read pipeline</text>
  <text x="556" y="116" fill="#F0561F" font-size="18" font-weight="700">&#8594;</text>
</svg>
